on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *'  # 每天 UTC 03:00 自动拉取上游并部署
jobs:
  build-and-deploy:
    runs-on: [ self-hosted, linux, x86, os ]  # 指定已注册的 runner
    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          # 拉取 Fork 并自动同步上游也可在此处用 actions/github-script
      - name: 构建并启动容器
        run: |
          docker-compose pull
          docker-compose up -d --remove-orphans
