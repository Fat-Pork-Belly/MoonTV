version: '3.8'

services:
  moontv-core:
    image: ghcr.io/senshinya/moontv:latest
    container_name: moontv-core
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - USERNAME=${USERNAME}
      - PASSWORD=${PASSWORD}
      - NEXT_PUBLIC_STORAGE_TYPE=redis
      - REDIS_URL=${REDIS_URL}
      - NEXT_PUBLIC_ENABLE_REGISTER=true
    depends_on:
      - moontv-redis
    networks:
      - moontv-network

  moontv-redis:
    image: redis:alpine
    container_name: moontv-redis
    restart: unless-stopped
    networks:
      - moontv-network

networks:
  moontv-network:
    driver: bridge
